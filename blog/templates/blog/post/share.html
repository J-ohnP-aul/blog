{% extends 'blog/base.html' %}
{% block title %}Share a post{% endblock %}
{% block content %}
  {% if sent %}
    <h1>Email successfuly sent</h1>
    <p>
      "{{post.title}}" was successfully sent to {{ form.to }}
    </p>
  {% else %}
    <h1>Share "{{post.title}}"</h1>
    <form method="post">
      {{ form.as_p }}
      {% csrf_token %}
      <input type="submit" value="send E-mail">
    </form>
  {% endif %} 
{% endblock %}
